<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pokemon Search</h1>

    <div class="card">

        <div class="search">
            <input type="text" placeholder="Enter pokemon name" spellcheck="false">
            <button><img src="images/search.png"></button>
        </div>

        <div class="pokemon">

            <img src="" class="pokemon-image">

            <h1 class="height">0</h1>

            <h2 class="pokemon-name">Pokemon</h2>

            <div class="details">

                <div class="col">
                    <div>
                        <p class="weight">0</p>
                        <p>Weight</p>
                    </div>
                </div>

                <div class="col">
                    <div>
                        <p class="pokemon-id">0</p>
                        <p>ID</p>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="main.js"></script>

</body>
</html>
